<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 18: Exposición de Metadatos</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 50px; }
        .img-container { border: 5px solid #30363d; display: inline-block; padding: 10px; background: #161b22; }
        .desc { margin-top: 20px; color: #8b949e; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h3>Análisis de Evidencia Digital</h3>
    <div class="img-container">
        <div style="width:300px; height:200px; background:#333; display:flex; align-items:center; justify-content:center;">
            🖼️ evidence_001.jpg
        </div>
    </div>
    <p class="desc">"A veces la respuesta no está en lo que ves, sino en las propiedades de lo que ves."</p>

    <script>
        // Simulando metadatos EXIF ocultos en el DOM
        const imageElement = document.querySelector('.img-container')
        imageElement.setAttribute('data-exif-author', 'Admin_KFH')
        imageElement.setAttribute('data-exif-location', '18.4861° N, 69.9312° W')
        imageElement.setAttribute('data-exif-comment', 'FLAG{METADATA_EXPOSURE_SECRET}')

        console.log("Imagen cargada. Analiza los atributos del elemento .img-container")
    </script>
</body>
</html>

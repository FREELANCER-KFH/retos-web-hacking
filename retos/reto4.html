<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 4: Agente Encubierto</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { background: #000; padding: 2rem; border: 1px solid #58a6ff; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); width: 450px; }
        .error { color: #f85149; }
        .success { color: #3fb950; }
    </style>
</head>
<body>
    <div class="terminal">
        <h3>> SISTEMA DE VERIFICACIÓN DE HARDWARE</h3>
        <p id="log">Escaneando User-Agent...</p>
        <p id="result" class="error">ACCESO DENEGADO: Navegador no autorizado.</p>
        <p id="hint" style="font-size: 0.8rem; color: #8b949e;">Solo terminales 'KFH-Browser/1.0' tienen acceso.</p>
        <div id="flag" style="display:none" class="success">
            <hr>
            FLAG: FLAG{USER_AGENT_SPOOFED_OK}
        </div>
    </div>

    <script>
        const checkAgent = () => {
            const agent = navigator.userAgent
            const result = document.getElementById('result')
            const flag = document.getElementById('flag')

            if (agent.includes('KFH-Browser/1.0')) {
                result.innerText = 'ACCESO AUTORIZADO'
                result.className = 'success'
                flag.style.display = 'block'
            }
        }

        setInterval(checkAgent, 1000)
    </script>
</body>
</html>

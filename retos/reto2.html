<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso Niv. 2</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #0a0a0a;
            padding: 2.5rem;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            width: 380px;
            text-align: center;
            border: 1px solid #0f0;
        }
        h2 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 0;
            border: 1px solid #0f0;
            background-color: #000;
            color: #0f0;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            box-shadow: 0 0 5px #0f0;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #0f0;
            border: 1px solid #0f0;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #0f0;
            color: #000;
        }
        #dashboard {
            display: none;
        }
        .success-title {
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #0f0;
        }
        .flag {
            background-color: #111;
            padding: 10px;
            border: 1px dashed #0f0;
            margin: 20px 0;
            color: #ff0;
            font-weight: bold;
        }
        .error-msg {
            color: #f00;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2>Ingreso Asegurado</h2>
        <input type="text" id="usr_v2" placeholder="ID DE AGENTE">
        <input type="password" id="pwd_v2" placeholder="CODIGO DE ACCESO">
        <button onclick="p()">Validar Acceso</button>
        <p id="msg" class="error-msg"></p>
    </div>

    <div id="dashboard" class="container">
        <h2 class="success-title">Acceso Nivel 2 Confirmado</h2>
        <p>Has superado la ofuscación básica.</p>
        <div class="flag">FLAG{OBFUSCATION_BYPASS_99}</div>
        <p>Analiza el tráfico para el siguiente nivel.</p>
        <button onclick="location.reload()">Terminar Sesión</button>
    </div>

</body>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 10: Consola de Diagnóstico</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        .console { border: 1px solid #0f0; padding: 20px; max-width: 600px; margin: auto; }
        input { background: transparent; border: none; border-bottom: 1px solid #0f0; color: #0f0; width: 200px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="console">
        <h3>Network Diagnostic Tool</h3>
        <p>Introduce una IP para hacer PING:</p>
        <span>> ping -c 4 </span><input type="text" id="target" placeholder="127.0.0.1">
        <button onclick="ejecutar()">EJECUTAR</button>
        <pre id="output" style="margin-top: 20px; color: #888;"></pre>
    </div>

    <script>
        const ejecutar = () => {
            const val = document.getElementById('target').value
            const out = document.getElementById('output')
            out.innerText = "Ejecutando..."

            setTimeout(() => {
                if (val.includes(';') || val.includes('&&')) {
                    out.innerText = `PING ${val.split(';')[0]}... OK\n\nLISTANDO DIRECTORIO /root/secret/:\n- flag.txt\n\nCONTENIDO DE flag.txt:\nFLAG{COMMAND_INJECTION_SUCCESS_2026}`
                    out.style.color = "#0f0"
                } else {
                    out.innerText = `PING ${val} (127.0.0.1): 56 data bytes\n64 bytes from 127.0.0.1: icmp_seq=0 ttl=64 time=0.045 ms`
                    out.style.color = "#888"
                }
            }, 1500)
        }
    </script>
</body>
</html>
